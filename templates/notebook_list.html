{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Your Notebooks</h2>
    <a href="{% url 'create_notebook' %}" class="btn">Create New</a>
</div>

{% for notebook in notebooks %}
<div class="card">
    <h3>{{ notebook.name }}</h3>
    <a href="{% url 'notebook_detail' notebook.id %}" class="btn">Open</a>
</div>
{% empty %}
<div class="card">
    <p>No notebooks yet.</p>
</div>
{% endfor %}
{% endblock %}
