<!DOCTYPE html>
<html>
<head>
    <title>VaqeelLM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #faf9f6;
            --sidebar-bg: #f5f3ee;
            --surface: #ffffff;
            --surface-2: #f8f7f4;
            --surface-hover: #f0ede6;
            --accent: #2c5f8a;
            --accent-dim: rgba(44,95,138,0.07);
            --accent-glow: rgba(44,95,138,0.14);
            --accent-soft: #5a88b0;
            --green: #2d7a4f;
            --green-dim: rgba(45,122,79,0.08);
            --danger: #c0392b;
            --danger-dim: rgba(192,57,43,0.07);
            --text-primary: #1a1815;
            --text-secondary: #6b6560;
            --text-muted: #b0aba4;
            --border: rgba(0,0,0,0.08);
            --border-subtle: rgba(0,0,0,0.05);
            --sidebar-width: 256px;
            --radius: 14px;
            --radius-sm: 9px;
        }

        body {
            font-family: 'Geist', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
        }

        /* Warm paper texture overlay */
        .sidebar::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(200,185,160,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 100%, rgba(180,165,140,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* ── Brand ── */
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 28px 22px 22px;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .sidebar-brand-icon {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            box-shadow: 0 2px 10px rgba(44,95,138,0.2);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-family: 'Instrument Serif', serif;
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1;
        }

        .brand-tagline {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── Nav ── */
        .sidebar-nav {
            padding: 18px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            position: relative;
        }

        .sidebar-section-label {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 8px;
            margin: 6px 0 8px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 400;
            transition: all 0.15s ease;
            position: relative;
            border: 1px solid transparent;
        }

        .nav-icon {
            font-size: 0.95rem;
            width: 18px;
            text-align: center;
            opacity: 0.5;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }

        .sidebar a:hover {
            color: var(--text-primary);
            background: var(--surface-hover);
        }

        .sidebar a:hover .nav-icon { opacity: 0.8; }

        .sidebar a.active {
            color: var(--accent);
            background: var(--accent-dim);
            font-weight: 500;
        }

        .sidebar a.active .nav-icon { opacity: 1; }

        .sidebar a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 2.5px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        /* ── Sidebar Footer ── */
        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid var(--border-subtle);
            position: relative;
        }

        .sidebar-footer a {
            color: var(--text-muted) !important;
            font-size: 0.875rem;
        }

        .sidebar-footer a:hover {
            background: var(--danger-dim) !important;
            color: var(--danger) !important;
        }

        /* ── Main Content ── */
        .content {
            margin-left: var(--sidebar-width);
            padding: 48px 56px;
            min-height: 100vh;
            animation: fadeUp 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }

        /* ── Page Header ── */
        .page-header {
            margin-bottom: 36px;
        }

        .page-header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2.1rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.65;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            padding: 28px 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .card:hover {
            border-color: rgba(0,0,0,0.12);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .card h3 {
            font-family: 'Instrument Serif', serif;
            font-weight: 400;
            font-size: 1.2rem;
            margin-bottom: 18px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        /* ── Buttons ── */
        .btn {
            padding: 10px 20px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Geist', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: all 0.16s ease;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 1px 8px rgba(44,95,138,0.2);
        }

        .btn-primary:hover {
            background: #245079;
            box-shadow: 0 4px 16px rgba(44,95,138,0.28);
        }

        .btn:not(.btn-danger):not(.btn-secondary):not(.btn-primary) {
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 1px 8px rgba(44,95,138,0.2);
        }

        .btn:not(.btn-danger):not(.btn-secondary):not(.btn-primary):hover {
            background: #245079;
            box-shadow: 0 4px 16px rgba(44,95,138,0.28);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            color: var(--text-primary);
            background: var(--surface-hover);
            border-color: rgba(0,0,0,0.14);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border-color: rgba(192,57,43,0.2);
        }

        .btn-danger:hover {
            background: var(--danger-dim);
            border-color: rgba(192,57,43,0.35);
        }

        /* ── Inputs ── */
        input, select, textarea {
            width: 100%;
            padding: 11px 15px;
            margin: 8px 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Geist', sans-serif;
            font-size: 0.875rem;
            font-weight: 400;
            outline: none;
            transition: border-color 0.16s, box-shadow 0.16s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: rgba(44,95,138,0.4);
            box-shadow: 0 0 0 3px rgba(44,95,138,0.07);
        }

        input::placeholder, textarea::placeholder { color: var(--text-muted); }

        select option { background: var(--surface); color: var(--text-primary); }

        textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: -4px;
            margin-top: 16px;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Utilities ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 9px;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        .badge-blue {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(44,95,138,0.15);
        }

        .badge-green {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(45,122,79,0.15);
        }

        .badge-muted {
            background: rgba(0,0,0,0.04);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .content { margin-left: 0; padding: 28px 20px; }
        }
    </style>
</head>
<body>

{% if user.is_authenticated %}
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">📓</div>
        <div class="brand-text">
            <h2>VaqeelLM</h2>
            <span class="brand-tagline">Legal Intelligence</span>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="sidebar-section-label">Navigation</div>
        <a href="{% url 'dashboard' %}">
            <span class="nav-icon">⊞</span> Dashboard
        </a>
        <a href="{% url 'notebook_list' %}">
            <span class="nav-icon">📚</span> Notebooks
        </a>
        <a href="{% url 'subscription' %}">
            <span class="nav-icon">✦</span> Subscription
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="{% url 'logout' %}">
            <span class="nav-icon">↩</span> Logout
        </a>
    </div>
</div>
{% endif %}

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
