version: "3.9"

services:
  web:
    build: .
    container_name: notebooklm_web
    command: gunicorn notebooklm.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - .:/app
      - static_volume:/app/static
      - db_volume:/app/db
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    environment:
      - DEBUG=1
      - QDRANT_URL=http://qdrant:6333

  qdrant:
    image: qdrant/qdrant:v1.4.0
    container_name: notebooklm_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__STORAGE_TYPE=rocksdb
      - QDRANT__SERVICE__LOG_LEVEL=info

volumes:
  static_volume:
  db_volume:
  qdrant_data: